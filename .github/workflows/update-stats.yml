name: Update Language Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'top_languages.svg'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate language stats SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_lang_stats.py

      - name: Commit and push SVG
        run: |
          git config --local user.email "181935842+Walidnsr@users.noreply.github.com"
          git config --local user.name "Walidnsr"
          git add top_languages.svg
          git diff --staged --quiet || git commit -m "chore: update top languages stats"
          git push
